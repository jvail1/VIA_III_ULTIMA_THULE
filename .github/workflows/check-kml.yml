name: Check VIA Chapter III KML for changes

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  check-kml:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download latest KML from Google My Maps
        run: |
          curl -sL \
            "https://www.google.com/maps/d/kml?mid=1ViwBu_vQsMQ3aMALsrIynLSTDilG5mg&forcekml=1" \
            -o latest.kml

      - name: Normalise both KMLs (strip rotating image URLs)
        run: |
          python3 - <<'EOF'
          import re, sys

          def normalise(path):
              with open(path, encoding='utf-8') as f:
                  text = f.read()
              # Strip Google-hosted image URLs — they rotate on every export
              text = re.sub(
                  r'https://mymaps\.usercontent\.google\.com/hostedimage/[^\s"<>]+',
                  'IMAGE_URL_REDACTED', text)
              # Strip <description> blocks that only contain an image tag
              text = re.sub(
                  r'<description><!\[CDATA\[\s*<img[^>]*>\s*\]\]></description>',
                  '<description><![CDATA[IMAGE_REDACTED]]></description>', text)
              return text

          ref  = normalise("VIA Chapter III - RACE Route & Locations.kml")
          new  = normalise("latest.kml")

          with open("ref_norm.kml",  "w", encoding="utf-8") as f: f.write(ref)
          with open("new_norm.kml",  "w", encoding="utf-8") as f: f.write(new)
          EOF

      - name: Diff normalised KMLs
        id: diff
        run: |
          if diff -u ref_norm.kml new_norm.kml > kml_diff.txt 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No structural changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected!"
            head -100 kml_diff.txt
          fi

      - name: Open GitHub issue if changed
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('kml_diff.txt', 'utf8').slice(0, 6000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: '⚠️ VIA Chapter III KML has changed — review race data',
              body: [
                '## KML change detected',
                '',
                'The official VIA Chapter III Google My Maps KML has changed since the last committed version.',
                '',
                '**Action required:** download the new KML, review the diff below, and update `via_III_planner_race.html` if race rules, gates, or ferry data have changed.',
                '',
                '### Diff (first 6 000 chars)',
                '```diff',
                diff,
                '```',
                '',
                `_Detected by scheduled workflow on ${new Date().toISOString().slice(0,10)}_`,
              ].join('\n'),
              labels: ['race-data'],
            });
